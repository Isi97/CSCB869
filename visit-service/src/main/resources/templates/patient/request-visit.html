<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: headerfiles"></head>
<body>
<nav th:replace="fragments :: navigation"></nav>

<br>
<br>

<div class="container">
    <div class="row">
        <div class="col-md-6 col-md-offset-3">

            <div th:if="${param.success}">
                <div class="alert alert-info">Visit has been requested</div>
            </div>

            <h1>Request a visit from one of the available doctors</h1>

            <form th:action="@{/patient/requestvisit}" th:object="${visit}" method="post">

            <th:block th:each="doctor : ${doctors}">
                <div class="card text-white bg-info mb-3" style="max-width: 18rem;">
                    <div class="card-header" th:text="${doctor.name}"></div>
                    <div class="card-body">
                        <h5 class="card-title" th:text="${doctor.type}"></h5>
                        <input type="radio" th:field="*{did}" th:value="${doctor.uid}" />
                    </div>
                </div>
            </th:block>

                <button type="submit" class="btn btn-success">Request</button>
            </form>


        </div>
    </div>
</div>

<div th:replace="fragments :: scripts"></div>
</body>
</html>
